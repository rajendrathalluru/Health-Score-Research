services:
  backend:
    build:
      context: ./backend
    container_name: healthscore-backend
    env_file:
      - ./backend/.env
    environment:
      NODE_ENV: production
      PORT: 3001
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:8080}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI:-http://localhost:8080/api/auth/google/callback}
      FITBIT_REDIRECT_URI: ${FITBIT_REDIRECT_URI:-http://localhost:8080/api/fitbit/callback}
    expose:
      - "3001"
    ports:
      - "3001:3001"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ""
    container_name: healthscore-frontend
    depends_on:
      - backend
    ports:
      - "8080:80"
    restart: unless-stopped
